<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>jeffimgbb · flsjeff</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/base.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
<script src="https://unpkg.com/@emotion/react@11.13.3/dist/emotion-react.umd.min.js"></script>
<script src="https://unpkg.com/@emotion/styled@11.13.0/dist/emotion-styled.umd.min.js"></script>
<script src="https://unpkg.com/@mui/material@5.16.7/umd/material-ui.production.min.js"></script>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
(async function () {
  try {
    var res = await fetch("js/boot/loader.ts?v=" + Date.now());
    if (!res.ok) throw new Error("No se pudo cargar el loader (" + res.status + ")");
    var out = Babel.transform(await res.text(), { presets: ["typescript"], filename: "loader.ts" }).code;
    new Function(out)();
  } catch (e) {
    document.getElementById("root").innerHTML =
      '<pre style="color:#ff8a80;padding:24px;font-family:monospace">Bootstrap error:\n' + (e && e.stack ? e.stack : e) + "</pre>";
  }
})();
</script>
</body>
</html>
